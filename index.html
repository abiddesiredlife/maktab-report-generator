<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مکتب فاطمہ للبنات رپورٹ کارڈ جنریٹر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Nastaliq+Urdu:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Noto Nastaliq Urdu', serif;
            direction: rtl;
            text-align: right;
            background: linear-gradient(to bottom, #f9f7f2, #e8e2d5);
            color: #222;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #001f3f;
            text-align: center;
            font-size: 2.4rem;
            margin-bottom: 10px;
        }
        .class-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .class-btn {
            background: #001f3f;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .class-btn:hover {
            background: #003366;
            transform: translateY(-2px);
        }
        .form-section {
            display: none;
        }
        label {
            display: block;
            margin: 12px 0 4px;
            font-weight: 700;
            color: #001f3f;
        }
        input {
            width: 100%;
            padding: 9px 11px;
            margin-bottom: 8px;
            border: 1px solid #d0c8b0;
            border-radius: 6px;
            font-size: 1rem;
            direction: rtl;
        }
        button.submit-btn {
            background: #001f3f;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 20px;
        }
        .report {
            display: none;
            width: 210mm;
            min-height: 297mm;
            margin: 30px auto;
            padding: 12mm 16mm 18mm;
            background: #fdfaf2;
            border: 3px double #d4af37;
            box-sizing: border-box;
            font-size: 13pt;
            color: #111;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8mm;
        }
        .logo {
            max-width: 90px;
            height: auto;
        }
        .title-block {
            flex: 1;
            text-align: center;
            margin: 0 10mm;
            background: linear-gradient(to right, #001f3f, #003366);
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(212,175,55,0.3);
        }
        .main-urdu-title {
            font-family: 'Noto Nastaliq Urdu', serif;
            font-size: 32pt;
            font-weight: 800;
            color: #d4af37;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
            margin: 0;
            line-height: 1.1;
        }
        .main-english-title {
            font-family: 'Cinzel', serif;
            font-size: 18pt;
            color: #d4af37;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            margin: 4px 0 0;
            letter-spacing: 1px;
        }
        .exam-title {
            font-size: 20pt;
            color: #d4af37;
            margin: 8px 0 0;
            font-weight: 700;
        }
        .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
            margin-bottom: 16px;
            font-size: 12.5pt;
        }
        .info p {
            margin: 0;
            padding: 5px 8px;
            background: rgba(212,175,55,0.05);
            border-radius: 4px;
            border: 1px solid rgba(212,175,55,0.15);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11pt;
            margin-bottom: 10px;
        }
        th, td {
            border: 1px solid #b0a070;
            padding: 6px 5px;
            text-align: center;
        }
        th {
            background: #001f3f;
            color: white;
        }
        .subject-col {
            background: #fff8e8;
            text-align: right;
            padding-right: 8px;
            font-weight: 600;
        }
        .passing-col {
            background: #e8fff8;
            font-weight: bold;
        }
        .totals {
            margin-top: 16px;
            padding: 12px;
            background: rgba(212,175,55,0.06);
            border: 1px solid #d4af37;
            border-radius: 7px;
            font-size: 13pt;
            font-weight: bold;
            text-align: center;
        }
        .signatures {
            margin-top: 35px;
            display: flex;
            justify-content: space-between;
            font-size: 12pt;
            font-weight: bold;
            color: #001f3f;
        }
        .sig {
            width: 45%;
            text-align: center;
        }
        .sig-line {
            border-top: 1.5px solid #d4af37;
            margin: 30px 0 6px;
        }
        #pdfButton {
            text-align: center;
            margin: 30px 0;
            display: none;
        }
        #pdfButton button {
            padding: 12px 45px;
            font-size: 1.15rem;
            background: #d4af37;
            color: #001f3f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        @media print {
            body * { visibility: hidden; }
            .report, .report * { visibility: visible; }
            .report {
                position: fixed;
                inset: 0;
                width: 100%;
                height: auto;
                margin: 0;
                padding: 12mm 16mm 18mm;
                border: none;
                background: white !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مکتب فاطمہ للبنات</h1>
    <p class="subtitle">سالانہ رپورٹ کارڈ جنریٹر</p>

    <div class="class-buttons">
        <button class="class-btn" onclick="showForm('nazira')">ناظرہ قرآن</button>
        <button class="class-btn" onclick="showForm('awwal')">سالانہ اول</button>
        <button class="class-btn" onclick="showForm('duwwam')">سالانہ دوم</button>
    </div>

    <!-- ناظرہ قرآن Form -->
    <div id="nazira" class="form-section">
        <label>امتحانی سال</label><input type="text" id="n_examYear" value="2026">
        <label>تعلیمی سال</label><input type="text" id="n_academicYear" value="2025-26">
        <label>طالبہ کا نام</label><input type="text" id="n_studentName">
        <label>ولدیت / زوجیت</label><input type="text" id="n_guardianName">
        <label>شعبہ</label><input type="text" id="n_department">
        <label>رول نمبر</label><input type="text" id="n_rollNo">

        <h2 style="text-align:center; color:#001f3f; margin:25px 0 12px;">مضامین تقریری</h2>
        <label>ناظرہ قرآن (100)</label><input type="number" id="n_nazra" min="0">
        <label>حفظ سورہ (100)</label><input type="number" id="n_hifzSurah" min="0">
        <label>آداب و دعائیں (100)</label><input type="number" id="n_adaabDua" min="0">
        <label>عقائد (اسماء حسنیٰ) (10)</label><input type="number" id="n_aqaedAsma" min="0">
        <label>اردو تقریری (50)</label><input type="number" id="n_urduTaq" min="0">

        <button class="submit-btn" onclick="generateReport('nazira')">رپورٹ تیار کریں</button>
    </div>

    <!-- سالانہ اول Form (your previous one with update) -->
    <div id="awwal" class="form-section">
        <label>امتحانی سال</label><input type="text" id="a_examYear" value="2026">
        <label>تعلیمی سال</label><input type="text" id="a_academicYear" value="2025-26">
        <label>طالبہ کا نام</label><input type="text" id="a_studentName">
        <label>ولدیت / زوجیت</label><input type="text" id="a_guardianName">
        <label>شعبہ</label><input type="text" id="a_department">
        <label>رول نمبر</label><input type="text" id="a_rollNo">

        <h2 style="text-align:center; color:#001f3f; margin:25px 0 12px;">مضامین تقریری</h2>
        <label>ناظرہ قرآن (100)</label><input type="number" id="a_nazra" min="0">
        <label>حفظ سورہ (100)</label><input type="number" id="a_hifzSurah" min="0">
        <label>حفظ حدیث (100)</label><input type="number" id="a_hifzHadith" min="0">
        <label>مسنون دعائیں (100)</label><input type="number" id="a_masnoonDua" min="0">
        <label>عقائد (اسماء حسنیٰ) (10)</label><input type="number" id="a_aqaedAsma" min="0">
        <label>اردو تقریری (50)</label><input type="number" id="a_urduTaq" min="0">

        <h2 style="text-align:center; color:#001f3f; margin:25px 0 12px;">مضامین تحریری</h2>
        <label>عقائد اسلام (90)</label><input type="number" id="a_aqaedIslam" min="0">
        <label>مسائل شریعت (100)</label><input type="number" id="a_masail" min="0">
        <label>سیرت النبی ﷺ (100)</label><input type="number" id="a_seerat" min="0">
        <label>اخلاقی تعلیم (100)</label><input type="number" id="a_akhlaqi" min="0">
        <label>عربی زبان (100)</label><input type="number" id="a_arabi" min="0">
        <label>اردو تحریری (50)</label><input type="number" id="a_urduTah" min="0">

        <button class="submit-btn" onclick="generateReport('awwal')">رپورٹ تیار کریں</button>
    </div>

    <!-- سالانہ دوم Form -->
    <div id="duwwam" class="form-section">
        <label>امتحانی سال</label><input type="text" id="d_examYear" value="2026">
        <label>تعلیمی سال</label><input type="text" id="d_academicYear" value="2025-26">
        <label>طالبہ کا نام</label><input type="text" id="d_studentName">
        <label>ولدیت / زوجیت</label><input type="text" id="d_guardianName">
        <label>شعبہ</label><input type="text" id="d_department">
        <label>رول نمبر</label><input type="text" id="d_rollNo">

        <h2 style="text-align:center; color:#001f3f; margin:25px 0 12px;">مضامین تقریری</h2>
        <label>ناظرہ قرآن (100)</label><input type="number" id="d_nazra" min="0">
        <label>حفظ سورہ (100)</label><input type="number" id="d_hifzSurah" min="0">
        <label>حفظ حدیث (100)</label><input type="number" id="d_hifzHadith" min="0">
        <label>مسنون دعائیں (100)</label><input type="number" id="d_masnoonDua" min="0">
        <label>عقائد (اسماء حسنیٰ) (10)</label><input type="number" id="d_aqaedAsma" min="0">
        <label>اردو تقریری (50)</label><input type="number" id="d_urduTaq" min="0">

        <h2 style="text-align:center; color:#001f3f; margin:25px 0 12px;">مضامین تحریری</h2>
        <label>عقائد اسلام (90)</label><input type="number" id="d_aqaedIslam" min="0">
        <label>مسائل شریعت (100)</label><input type="number" id="d_masail" min="0">
        <label>سیرت النبی ﷺ (100)</label><input type="number" id="d_seerat" min="0">
        <label>اخلاقی تعلیم (100)</label><input type="number" id="d_akhlaqi" min="0">
        <label>عربی زبان (100)</label><input type="number" id="d_arabi" min="0">
        <label>اردو تحریری (50)</label><input type="number" id="d_urduTah" min="0">
        <label>درس قرآن (100)</label><input type="number" id="d_darsQuran" min="0">

        <button class="submit-btn" onclick="generateReport('duwwam')">رپورٹ تیار کریں</button>
    </div>

    <div id="report" class="report">
        <!-- Report content will be generated here -->
    </div>

    <div id="pdfButton" style="display:none; text-align:center; margin:30px 0;">
        <button onclick="downloadPDF()">PDF ڈاؤن لوڈ کریں</button>
    </div>

    <script>
        let currentClass = '';

        function showForm(classType) {
            document.querySelectorAll('.form-section').forEach(sec => sec.style.display = 'none');
            document.getElementById(classType).style.display = 'block';
            currentClass = classType;
            document.getElementById('report').style.display = 'none';
            document.getElementById('pdfButton').style.display = 'none';
        }

        function generateReport(classType) {
            const prefix = classType === 'nazira' ? 'n_' :
                           classType === 'awwal' ? 'a_' : 'd_';

            const examYear = document.getElementById(prefix + 'examYear').value;
            const academicYear = document.getElementById(prefix + 'academicYear').value;
            const studentName = document.getElementById(prefix + 'studentName').value;
            const guardianName = document.getElementById(prefix + 'guardianName').value;
            const department = document.getElementById(prefix + 'department').value;
            const rollNo = document.getElementById(prefix + 'rollNo').value;

            let marks = {};
            let maxMarks = {};
            let passingMarks = {};
            let subjectsTaqriri = [];
            let subjectsTahreeri = [];

            if (classType === 'nazira') {
                subjectsTaqriri = [
                    {id:'nazra', name:'ناظرہ قرآن', max:100, pass:35},
                    {id:'hifzSurah', name:'حفظ سورہ', max:100, pass:35},
                    {id:'adaabDua', name:'آداب و دعائیں', max:100, pass:35},
                    {id:'aqaedAsma', name:'عقائد (اسماء حسنیٰ)', max:10, pass:4},
                    {id:'urduTaq', name:'اردو تقریری', max:50, pass:17.5}
                ];
                maxMarks.total = 460;
            } else if (classType === 'awwal') {
                subjectsTaqriri = [
                    {id:'nazra', name:'ناظرہ قرآن', max:100, pass:35},
                    {id:'hifzSurah', name:'حفظ سورہ', max:100, pass:35},
                    {id:'hifzHadith', name:'حفظ حدیث', max:100, pass:35},
                    {id:'masnoonDua', name:'مسنون دعائیں', max:100, pass:35},
                    {id:'aqaedAsma', name:'عقائد (اسماء حسنیٰ)', max:10, pass:4},
                    {id:'urduTaq', name:'اردو تقریری', max:50, pass:17.5}
                ];
                subjectsTahreeri = [
                    {id:'aqaedIslam', name:'عقائد اسلام', max:90, pass:35},
                    {id:'masail', name:'مسائل شریعت', max:100, pass:35},
                    {id:'seerat', name:'سیرت النبی ﷺ', max:100, pass:35},
                    {id:'akhlaqi', name:'اخلاقی تعلیم', max:100, pass:35},
                    {id:'arabi', name:'عربی زبان', max:100, pass:35},
                    {id:'urduTah', name:'اردو تحریری', max:50, pass:17.5}
                ];
                maxMarks.total = 1000;
            } else if (classType === 'duwwam') {
                subjectsTaqriri = [
                    {id:'nazra', name:'ناظرہ قرآن', max:100, pass:35},
                    {id:'hifzSurah', name:'حفظ سورہ', max:100, pass:35},
                    {id:'hifzHadith', name:'حفظ حدیث', max:100, pass:35},
                    {id:'masnoonDua', name:'مسنون دعائیں', max:100, pass:35},
                    {id:'aqaedAsma', name:'عقائد (اسماء حسنیٰ)', max:10, pass:4},
                    {id:'urduTaq', name:'اردو تقریری', max:50, pass:17.5}
                ];
                subjectsTahreeri = [
                    {id:'aqaedIslam', name:'عقائد اسلام', max:90, pass:35},
                    {id:'masail', name:'مسائل شریعت', max:100, pass:35},
                    {id:'seerat', name:'سیرت النبی ﷺ', max:100, pass:35},
                    {id:'akhlaqi', name:'اخلاقی تعلیم', max:100, pass:35},
                    {id:'arabi', name:'عربی زبان', max:100, pass:35},
                    {id:'urduTah', name:'اردو تحریری', max:50, pass:17.5},
                    {id:'darsQuran', name:'درس قرآن', max:100, pass:35}
                ];
                maxMarks.total = 1100;
            }

            let invalid = false;
            [...subjectsTaqriri, ...subjectsTahreeri].forEach(sub => {
                let val = parseFloat(document.getElementById(prefix + sub.id).value) || 0;
                if (val > sub.max) {
                    alert(`غلط نمبر: "${sub.name}" میں زیادہ سے زیادہ ${sub.max} ہیں۔`);
                    invalid = true;
                }
                marks[sub.id] = val;
                document.getElementById('r_' + sub.id).textContent = val;
            });

            if (invalid) return;

            let taqririObtained = subjectsTaqriri.reduce((sum, s) => sum + marks[s.id], 0);
            let tahreeriObtained = subjectsTahreeri.reduce((sum, s) => sum + marks[s.id], 0);
            let totalObtained = taqririObtained + tahreeriObtained;
            let percentage = (totalObtained / maxMarks.total * 100).toFixed(2);
            let grade = percentage >= 90 ? 'A+' : percentage >= 80 ? 'A' : percentage >= 70 ? 'B' :
                        percentage >= 60 ? 'C' : percentage >= 50 ? 'D' : 'F';
            let result = percentage >= 33 ? 'کامیاب' : 'ناکام';

            let reportHTML = `
                <div class="header">
                    <div class="logo-container">
                        <img src="logo.png" alt="لوگو" class="logo">
                    </div>
                    <div class="title-block">
                        <div class="main-urdu-title">مکتب فاطمہ للبنات</div>
                        <div class="main-english-title">MAKTAB FATIMAH LIL BANAT</div>
                        <div class="exam-title">نتیجہ امتحان سالانہ</div>
                    </div>
                    <div style="width:85px;"></div>
                </div>

                <div class="info">
                    <p>امتحانی سال: ${examYear}</p>
                    <p>تعلیمی سال: ${academicYear}</p>
                    <p>طالبہ کا نام: ${studentName}</p>
                    <p>ولدیت / زوجیت: ${guardianName}</p>
                    <p>شعبہ: ${department || '—'}</p>
                    <p>رول نمبر: ${rollNo}</p>
                </div>

                <div class="subjects" style="display:flex; gap:16px;">
                    <div class="block">
                        <h3>مضامین تقریری</h3>
                        <table>
                            <tr><th>مضمون</th><th>مجوزہ نمبر</th><th>ادنی کامیاب نمبر</th><th>حاصل کردہ</th></tr>
                            \( {subjectsTaqriri.map(s => `<tr><td class="subject-col"> \){s.name}</td><td>\( {s.max}</td><td class="passing-col"> \){s.pass}</td><td>${marks[s.id]}</td></tr>`).join('')}
                            <tr><td colspan="2" style="font-weight:bold; background:#fffacd;">مجموعہ تقریری</td><td>\( {subjectsTaqriri.reduce((sum,s)=>sum+s.max,0)}</td><td> \){taqririObtained}</td></tr>
                        </table>
                    </div>
                    <div class="block">
                        <h3>مضامین تحریری</h3>
                        <table>
                            <tr><th>مضمون</th><th>مجوزہ نمبر</th><th>ادنی کامیاب نمبر</th><th>حاصل کردہ</th></tr>
                            \( {subjectsTahreeri.map(s => `<tr><td class="subject-col"> \){s.name}</td><td>\( {s.max}</td><td class="passing-col"> \){s.pass}</td><td>${marks[s.id]}</td></tr>`).join('')}
                            <tr><td colspan="2" style="font-weight:bold; background:#fffacd;">مجموعہ تحریری</td><td>\( {subjectsTahreeri.reduce((sum,s)=>sum+s.max,0)}</td><td> \){tahreeriObtained}</td></tr>
                        </table>
                    </div>
                </div>

                <div class="total
