<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maktab Report</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-section">

<h2>سالانہ امتحان سیٹ اپ</h2>

<label>امتحانی سال</label>
<input type="text" id="examYear" value="2026">

<label>طالبہ کا نام</label>
<input type="text" id="studentName">

<label>والدیت</label>
<input type="text" id="guardianName">

<label>درجہ</label>
<input type="text" id="className">

<label>رول نمبر</label>
<input type="text" id="rollNo">

<label>تعلیمی سال</label>
<input type="text" id="academicYear" value="2025-26">

<hr>

<h3>حاصل کردہ نمبر درج کریں</h3>

<h4>مضامین تقریری</h4>

<input type="number" id="nazira" placeholder="ناظرہ قرآن (100)">
<input type="number" id="hifzSurah" placeholder="حفظ سورہ (100)">
<input type="number" id="hifzHadees" placeholder="حفظ حدیث (100)">
<input type="number" id="masnoon" placeholder="مسنون دعائیں (100)">
<input type="number" id="aqaaidOral" placeholder="عقائد (10)">
<input type="number" id="urduOral" placeholder="اردو تقریری (50)">

<h4>مضامین تحریری</h4>

<input type="number" id="aqaaidIslam" placeholder="عقائد اسلام (90)">
<input type="number" id="masail" placeholder="مسائل شریعت (100)">
<input type="number" id="seerat" placeholder="سیرت النبی ﷺ (100)">
<input type="number" id="akhlaq" placeholder="اخلاقی تعلیم (100)">
<input type="number" id="arabi" placeholder="عربی زبان (100)">
<input type="number" id="urduWritten" placeholder="اردو تحریری (50)">

<br>
<button onclick="generateReport()">رپورٹ تیار کریں</button>

</div>

<div id="reportArea"></div>

<script src="script.js"></script>
</body>
</html>
