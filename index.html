<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maktab Report Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-section">

<h2>سالانہ امتحان سیٹ اپ / Annual Examination Setup</h2>

<label>امتحانی سال / Exam Year</label>
<input type="text" id="examYear">

<label>طالبہ کا نام / Student Name</label>
<input type="text" id="studentName">

<label>والدیت / Waldiyyat (Guardian)</label>
<input type="text" id="fatherName">

<label>درجہ / Class</label>
<input type="text" id="className">

<label>رول نمبر / Roll No</label>
<input type="text" id="rollNo">

<label>تعلیمی سال / Academic Year</label>
<input type="text" id="academicYear">

<hr>

<h3>حاصل کردہ نمبر درج کریں / Enter Obtained Marks Only</h3>

<h4>مضامین تقریری / Mazameen Taqreeri</h4>

<label>ناظرہ قرآن (100)</label>
<input type="number" id="nazira">

<label>حفظ سورہ (100)</label>
<input type="number" id="hifzSurah">

<label>حفظ حدیث (100)</label>
<input type="number" id="hifzHadees">

<label>مسنون دعائیں (100)</label>
<input type="number" id="masnoon">

<label>عقائد (10)</label>
<input type="number" id="aqaaidOral">

<label>اردو تقریری (50)</label>
<input type="number" id="urduOral">

<hr>

<h4>مضامین تحریری / Mazameen Tehreeri</h4>

<label>عقائد اسلام (90)</label>
<input type="number" id="aqaaidIslam">

<label>مسائل شریعت (100)</label>
<input type="number" id="masail">

<label>سیرت النبی ﷺ (100)</label>
<input type="number" id="seerat">

<label>اخلاقی تعلیم (100)</label>
<input type="number" id="akhlaq">

<label>عربی زبان (100)</label>
<input type="number" id="arabi">

<label>اردو تحریری (50)</label>
<input type="number" id="urduWritten">

<br>
<button onclick="generateReport()">Generate Report</button>

</div>

<div id="reportArea"></div>

<script src="script.js"></script>
</body>
</html>
