<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مکتب فاطمہ للبنات رپورٹ کارڈ جنریٹر</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --navy: #001f3f;
            --gold: #d4af37;
            --ivory: #fdfaf2;
        }
        body {
            font-family: 'Noto Nastaliq Urdu', serif;
            direction: rtl;
            text-align: right;
            background: linear-gradient(to bottom, #f9f7f2, #e8e2d5);
            color: #222;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 12px 45px rgba(0,0,0,0.1);
        }
        h1 {
            color: var(--navy);
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: var(--navy);
            font-size: 1.5rem;
            margin: 0 0 30px;
        }
        .class-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 45px 0;
            flex-wrap: wrap;
        }
        .class-btn {
            background: var(--navy);
            color: white;
            padding: 18px 36px;
            border: none;
            border-radius: 12px;
            font-size: 1.35rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 240px;
            box-shadow: 0 4px 12px rgba(0,31,63,0.25);
        }
        .class-btn:hover {
            background: #003366;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,31,63,0.35);
        }
        .form-section {
            display: none;
        }
        label {
            display: block;
            margin: 14px 0 5px;
            font-weight: 700;
            color: var(--navy);
        }
        input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 10px;
            border: 1px solid #d0c8b0;
            border-radius: 6px;
            font-size: 1.05rem;
            direction: rtl;
        }
        .submit-btn {
            background: var(--navy);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            width: 100%;
            margin-top: 25px;
            box-shadow: 0 4px 12px rgba(0,31,63,0.2);
        }
        .submit-btn:hover {
            background: #003366;
        }
        .report {
            display: none;
            width: 210mm;
            min-height: 297mm;
            margin: 30px auto;
            padding: 14mm 18mm 20mm;
            background: var(--ivory);
            border: 4px double var(--gold);
            box-shadow: 0 0 30px rgba(212,175,55,0.25);
            box-sizing: border-box;
            font-size: 13.5pt;
            color: #111;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10mm;
        }
        .logo {
            max-width: 110px;
            height: auto;
        }
        .title-block {
            flex: 1;
            text-align: center;
            margin: 0 12mm;
            background: linear-gradient(to right, var(--navy), #002b55);
            padding: 16px 28px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(212,175,55,0.35);
        }
        .main-urdu-title {
            font-size: 38pt;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 2.5px 2.5px 7px rgba(0,0,0,0.6);
            margin: 0;
            line-height: 1.05;
        }
        .location {
            font-size: 18pt;
            color: var(--gold);
            margin: 10px 0 0;
            font-weight: 700;
        }
        .exam-title {
            font-size: 22pt;
            color: var(--gold);
            margin: 12px 0 0;
            font-weight: 700;
        }
        .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
            margin-bottom: 20px;
            font-size: 13pt;
            background: rgba(212,175,55,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(212,175,55,0.2);
        }
        .info p {
            margin: 0;
            padding: 6px 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11.5pt;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #b0a070;
            padding: 7px 6px;
            text-align: center;
        }
        th {
            background: var(--navy);
            color: white;
            font-weight: 700;
        }
        .subject-col {
            background: #fff8e8;
            text-align: right;
            padding-right: 10px;
            font-weight: 600;
        }
        .passing-col {
            background: #e8fff8;
            font-weight: bold;
        }
        .totals {
            margin-top: 20px;
            padding: 14px;
            background: rgba(212,175,55,0.08);
            border: 2px solid var(--gold);
            border-radius: 10px;
            font-size: 14pt;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 3px 10px rgba(212,175,55,0.2);
        }
        .signatures {
            margin-top: 45px;
            display: flex;
            justify-content: space-between;
            font-size: 13pt;
            font-weight: bold;
            color: var(--navy);
        }
        .sig {
            width: 45%;
            text-align: center;
        }
        .sig-line {
            border-top: 2px solid var(--gold);
            margin: 40px 0 8px;
        }
        #pdfButton {
            text-align: center;
            margin: 40px 0;
            display: none;
        }
        #pdfButton button {
            padding: 14px 50px;
            font-size: 1.25rem;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(212,175,55,0.3);
        }
        #pdfButton button:hover {
            background: #e6c04e;
        }
        @media print {
            body * { visibility: hidden; }
            .report, .report * { visibility: visible; }
            .report {
                position: fixed;
                inset: 0;
                width: 100%;
                height: auto;
                margin: 0;
                padding: 14mm 18mm 20mm;
                border: none;
                box-shadow: none;
                background: white !important;
            }
            #pdfButton { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مکتب فاطمہ للبنات</h1>
    <p class="subtitle">سالانہ رپورٹ کارڈ جنریٹر</p>

    <div class="class-buttons">
        <button class="class-btn" onclick="showForm('nazira')">ناظرہ قرآن</button>
        <button class="class-btn" onclick="showForm('awwal')">سالانہ اول</button>
        <button class="class-btn" onclick="showForm('duwwam')">سالانہ دوم</button>
    </div>

    <!-- ناظرہ قرآن Form -->
    <div id="nazira" class="form-section">
        <label>امتحانی سال</label><input type="text" id="n_examYear" value="2026">
        <label>تعلیمی سال</label><input type="text" id="n_academicYear" value="2025-26">
        <label>طالبہ کا نام</label><input type="text" id="n_studentName">
        <label>ولدیت / زوجیت</label><input type="text" id="n_guardianName">
        <label>شعبہ</label><input type="text" id="n_department">
        <label>رول نمبر</label><input type="text" id="n_rollNo">

        <h2 style="text-align:center; color:var(--navy); margin:25px 0 12px;">مضامین تقریری</h2>
        <label>ناظرہ قرآن (100)</label><input type="number" id="n_nazra" min="0">
        <label>حفظ سورہ (100)</label><input type="number" id="n_hifzSurah" min="0">
        <label>آداب و دعائیں (100)</label><input type="number" id="n_adaabDua" min="0">
        <label>عقائد (اسماء حسنیٰ) (10)</label><input type="number" id="n_aqaedAsma" min="0">
        <label>اردو تقریری (50)</label><input type="number" id="n_urduTaq" min="0">

        <button class="submit-btn" onclick="generateReport('nazira')">رپورٹ تیار کریں</button>
    </div>

    <!-- سالانہ اول Form -->
    <div id="awwal" class="form-section">
        <label>امتحانی سال</label><input type="text" id="a_examYear" value="2026">
        <label>تعلیمی سال</label><input type="text" id="a_academicYear" value="2025-26">
        <label>طالبہ کا نام</label><input type="text" id="a_studentName">
        <label>ولدیت / زوجیت</label><input type="text" id="a_guardianName">
        <label>شعبہ</label><input type="text" id="a_department">
        <label>رول نمبر</label><input type="text" id="a_rollNo">

        <h2 style="text-align:center; color:var(--navy); margin:25px 0 12px;">مضامین تقریری</h2>
        <label>ناظرہ قرآن (100)</label><input type="number" id="a_nazra" min="0">
        <label>حفظ سورہ (100)</label><input type="number" id="a_hifzSurah" min="0">
        <label>حفظ حدیث (100)</label><input type="number" id="a_hifzHadith" min="0">
        <label>مسنون دعائیں (100)</label><input type="number" id="a_masnoonDua" min="0">
        <label>عقائد (اسماء حسنیٰ) (10)</label><input type="number" id="a_aqaedAsma" min="0">
        <label>اردو تقریری (50)</label><input type="number" id="a_urduTaq" min="0">

        <h2 style="text-align:center; color:var(--navy); margin:25px 0 12px;">مضامین تحریری</h2>
        <label>عقائد اسلام (90)</label><input type="number" id="a_aqaedIslam" min="0">
        <label>مسائل شریعت (100)</label><input type="number" id="a_masail" min="0">
        <label>سیرت النبی ﷺ (100)</label><input type="number" id="a_seerat" min="0">
        <label>اخلاقی تعلیم (100)</label><input type="number" id="a_akhlaqi" min="0">
        <label>عربی زبان (100)</label><input type="number" id="a_arabi" min="0">
        <label>اردو تحریری (50)</label><input type="number" id="a_urduTah" min="0">

        <button class="submit-btn" onclick="generateReport('awwal')">رپورٹ تیار کریں</button>
    </div>

    <!-- سالانہ دوم Form -->
    <div id="duwwam" class="form-section">
        <label>امتحانی سال</label><input type="text" id="d_examYear" value="2026">
        <label>تعلیمی سال</label><input type="text" id="d_academicYear" value="2025-26">
        <label>طالبہ کا نام</label><input type="text" id="d_studentName">
        <label>ولدیت / زوجیت</label><input type="text" id="d_guardianName">
        <label>شعبہ</label><input type="text" id="d_department">
        <label>رول نمبر</label><input type="text" id="d_rollNo">

        <h2 style="text-align:center; color:var(--navy); margin:25px 0 12px;">مضامین تقریری</h2>
        <label>ناظرہ قرآن (100)</label><input type="number" id="d_nazra" min="0">
        <label>حفظ سورہ (100)</label><input type="number" id="d_hifzSurah" min="0">
        <label>حفظ حدیث (100)</label><input type="number" id="d_hifzHadith" min="0">
        <label>مسنون دعائیں (100)</label><input type="number" id="d_masnoonDua" min="0">
        <label>عقائد (اسماء حسنیٰ) (10)</label><input type="number" id="d_aqaedAsma" min="0">
        <label>اردو تقریری (50)</label><input type="number" id="d_urduTaq" min="0">

        <h2 style="text-align:center; color:var(--navy); margin:25px 0 12px;">مضامین تحریری</h2>
        <label>عقائد اسلام (90)</label><input type="number" id="d_aqaedIslam" min="0">
        <label>مسائل شریعت (100)</label><input type="number" id="d_masail" min="0">
        <label>سیرت النبی ﷺ (100)</label><input type="number" id="d_seerat" min="0">
        <label>اخلاقی تعلیم (100)</label><input type="number" id="d_akhlaqi" min="0">
        <label>عربی زبان (100)</label><input type="number" id="d_arabi" min="0">
        <label>اردو تحریری (50)</label><input type="number" id="d_urduTah" min="0">
        <label>درس قرآن (100)</label><input type="number" id="d_darsQuran" min="0">

        <button class="submit-btn" onclick="generateReport('duwwam')">رپورٹ تیار کریں</button>
    </div>

    <div id="report" class="report"></div>

    <div id="pdfButton" style="display:none; text-align:center; margin:40px 0;">
        <button onclick="downloadPDF()">PDF ڈاؤن لوڈ کریں</button>
    </div>

    <script>
        let currentClass = '';

        function showForm(classType) {
            document.querySelectorAll('.form-section').forEach(sec => sec.style.display = 'none');
            const form = document.getElementById(classType);
            if (form) {
                form.style.display = 'block';
                currentClass = classType;
                document.getElementById('report').innerHTML = '';
                document.getElementById('report').style.display = 'none';
                document.getElementById('pdfButton').style.display = 'none';
            }
        }

        function generateReport(classType) {
            const prefix = classType === 'nazira' ? 'n_' :
                           classType === 'awwal' ? 'a_' : 'd_';

            const examYear = document.getElementById(prefix + 'examYear').value.trim() || '—';
            const academicYear = document.getElementById(prefix + 'academicYear').value.trim() || '—';
            const studentName = document.getElementById(prefix + 'studentName').value.trim() || '—';
            const guardianName = document.getElementById(prefix + 'guardianName').value.trim() || '—';
            const department = document.getElementById(prefix + 'department').value.trim() || '—';
            const rollNo = document.getElementById(prefix + 'rollNo').value.trim() || '—';

            let taqririSubjects = [];
            let tahreeriSubjects = [];
            let totalMax = 0;

            const getPass = (max) => Math.round(max * 0.35 * 10) / 10; // 35% proportional

            if (classType === 'nazira') {
                taqririSubjects = [
                    {id:'nazra', name:'ناظرہ قرآن', max:100},
                    {id:'hifzSurah', name:'حفظ سورہ', max:100},
                    {id:'adaabDua', name:'آداب و دعائیں', max:100},
                    {id:'aqaedAsma', name:'عقائد (اسماء حسنیٰ)', max:10},
                    {id:'urduTaq', name:'اردو تقریری', max:50}
                ];
                totalMax = 460;
            } else if (classType === 'awwal') {
                taqririSubjects = [
                    {id:'nazra', name:'ناظرہ قرآن', max:100},
                    {id:'hifzSurah', name:'حفظ سورہ', max:100},
                    {id:'hifzHadith', name:'حفظ حدیث', max:100},
                    {id:'masnoonDua', name:'مسنون دعائیں', max:100},
                    {id:'aqaedAsma', name:'عقائد (اسماء حسنیٰ)', max:10},
                    {id:'urduTaq', name:'اردو تقریری', max:50}
                ];
                tahreeriSubjects = [
                    {id:'aqaedIslam', name:'عقائد اسلام', max:90},
                    {id:'masail', name:'مسائل شریعت', max:100},
                    {id:'seerat', name:'سیرت النبی ﷺ', max:100},
                    {id:'akhlaqi', name:'اخلاقی تعلیم', max:100},
                    {id:'arabi', name:'عربی زبان', max:100},
                    {id:'urduTah', name:'اردو تحریری', max:50}
                ];
                totalMax = 1000;
            } else if (classType === 'duwwam') {
                taqririSubjects = [
                    {id:'nazra', name:'ناظرہ قرآن', max:100},
                    {id:'hifzSurah', name:'حفظ سورہ', max:100},
                    {id:'hifzHadith', name:'حفظ حدیث', max:100},
                    {id:'masnoonDua', name:'مسنون دعائیں', max:100},
                    {id:'aqaedAsma', name:'عقائد (اسماء حسنیٰ)', max:10},
                    {id:'urduTaq', name:'اردو تقریری', max:50}
                ];
                tahreeriSubjects = [
                    {id:'aqaedIslam', name:'عقائد اسلام', max:90},
                    {id:'masail', name:'مسائل شریعت', max:100},
                    {id:'seerat', name:'سیرت النبی ﷺ', max:100},
                    {id:'akhlaqi', name:'اخلاقی تعلیم', max:100},
                    {id:'arabi', name:'عربی زبان', max:100},
                    {id:'urduTah', name:'اردو تحریری', max:50},
                    {id:'darsQuran', name:'درس قرآن', max:100}
                ];
                totalMax = 1100;
            }

            let invalid = false;
            let taqririObtained = 0;
            let tahreeriObtained = 0;

            taqririSubjects.forEach(s => {
                const val = parseFloat(document.getElementById(prefix + s.id)?.value) || 0;
                if (val > s.max) {
                    alert(`غلط نمبر: "${s.name}" میں زیادہ سے زیادہ ${s.max} ہیں۔`);
                    invalid = true;
                }
                taqririObtained += val;
            });

            tahreeriSubjects.forEach(s => {
                const val = parseFloat(document.getElementById(prefix + s.id)?.value) || 0;
                if (val > s.max) {
                    alert(`غلط نمبر: "${s.name}" میں زیادہ سے زیادہ ${s.max} ہیں۔`);
                    invalid = true;
                }
                tahreeriObtained += val;
            });

            if (invalid) return;

            const totalObtained = taqririObtained + tahreeriObtained;
            const percentage = totalMax > 0 ? (totalObtained / totalMax * 100).toFixed(2) : '0.00';
            const grade = percentage >= 90 ? 'A+' :
                          percentage >= 80 ? 'A' :
                          percentage >= 70 ? 'B' :
                          percentage >= 60 ? 'C' :
                          percentage >= 50 ? 'D' : 'F';
            const result = percentage >= 33 ? 'کامیاب' : 'ناکام';

            let taqririRows = taqririSubjects.map(s => {
                const pass = getPass(s.max);
                return `<tr>
                    <td class="subject-col">${s.name}</td>
                    <td>${s.max}</td>
                    <td class="passing-col">${pass}</td>
                    <td>${parseFloat(document.getElementById(prefix + s.id)?.value) || 0}</td>
                </tr>`;
            }).join('');

            let tahreeriRows = tahreeriSubjects.map(s => {
                const pass = getPass(s.max);
                return `<tr>
                    <td class="subject-col">${s.name}</td>
                    <td>${s.max}</td>
                    <td class="passing-col">${pass}</td>
                    <td>${parseFloat(document.getElementById(prefix + s.id)?.value) || 0}</td>
                </tr>`;
            }).join('');

            const taqririMax = taqririSubjects.reduce((sum, s) => sum + s.max, 0);
            const tahreeriMax = tahreeriSubjects.reduce((sum, s) => sum + s.max, 0);

            const reportHTML = `
                <div class="header">
                    <div class="logo-container">
                        <img src="logo.png" alt="لوگو" class="logo">
                    </div>
                    <div class="title-block">
                        <div class="main-urdu-title">مکتب فاطمہ للبنات</div>
                        <div class="location">خمّم، تلنگانہ</div>
                        <div class="exam-title">نتیجہ امتحان سالانہ</div>
                    </div>
                    <div style="width:110px;"></div>
                </div>

                <div class="info">
                    <p>امتحانی سال: ${examYear}</p>
                    <p>تعلیمی سال: ${academicYear}</p>
                    <p>طالبہ کا نام: ${studentName}</p>
                    <p>ولدیت / زوجیت: ${guardianName}</p>
                    <p>شعبہ: ${department}</p>
                    <p>رول نمبر: ${rollNo}</p>
                </div>

                <div style="display:flex; justify-content:space-between; gap:18px; margin:24px 0;">
                    <div style="flex:1;">
                        <h3 style="text-align:center; background:var(--navy); color:white; padding:10px; margin:0; border-radius:8px 8px 0 0; font-size:15pt;">مضامین تقریری</h3>
                        <table>
                            <tr><th>مضمون</th><th>مجوزہ نمبر</th><th>ادنی کامیاب نمبر</th><th>حاصل کردہ</th></tr>
                            ${taqririRows}
                            <tr style="font-weight:bold; background:#fffacd;">
                                <td colspan="2">مجموعہ تقریری</td>
                                <td>${taqririMax}</td>
                                <td>${taqririObtained}</td>
                            </tr>
                        </table>
                    </div>
                    <div style="flex:1;">
                        <h3 style="text-align:center; background:var(--navy); color:white; padding:10px; margin:0; border-radius:8px 8px 0 0; font-size:15pt;">مضامین تحریری</h3>
                        <table>
                            <tr><th>مضمون</th><th>مجوزہ نمبر</th><th>ادنی کامیاب نمبر</th><th>حاصل کردہ</th></tr>
                            ${tahreeriRows}
                            <tr style="font-weight:bold; background:#fffacd;">
                                <td colspan="2">مجموعہ تحریری</td>
                                <td>${tahreeriMax}</td>
                                <td>${tahreeriObtained}</td>
                            </tr>
                        </table>
                    </div>
                </div>

                <div class="totals">
                    <p>کل مجموعہ: ${totalObtained} / ${totalMax}</p>
                    <p>فیصد: ${percentage}%</p>
                    <p class="result" style="font-size:16pt; margin-top:14px;">درجہ: ${grade} | نتیجہ: ${result}</p>
                </div>

                <div class="signatures">
                    <div class="sig">
                        <div class="sig-line"></div>
                        مدرس
                    </div>
                    <div class="sig">
                        <div class="sig-line"></div>
                        صدر مدرسہ
                    </div>
                </div>
            `;

            document.getElementById('report').innerHTML = reportHTML;
            document.getElementById('report').style.display = 'block';
            document.getElementById('pdfButton').style.display = 'block';

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function getPass(max) {
            return (max * 0.35).toFixed(max >= 50 ? 1 : 0).replace('.0', '');
        }

        async function downloadPDF() {
            const element = document.getElementById('report');
            if (!element || element.style.display !== 'block') {
                alert("پہلے رپورٹ تیار کریں!");
                return;
            }

            await new Promise(r => setTimeout(r, 1800));

            const canvas = await html2canvas(element, {
                scale: 1.5,
                useCORS: true,
                allowTaint: false,
                logging: false,
                scrollY: -window.scrollY
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.92);
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            const ratio = Math.min(pdfWidth / canvas.width, pdfHeight / canvas.height);
            const imgW = canvas.width * ratio;
            const imgH = canvas.height * ratio;

            pdf.addImage(imgData, 'JPEG', 0, 0, imgW, imgH);
            pdf.save('رپورٹ_کارڈ.pdf');
        }
    </script>
</body>
